{{- if .Values.cacheNode.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "printforge.fullname" . }}-cache-node
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "printforge.componentLabels" (dict "root" . "component" "cache-node") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "printforge.selectorLabels" (dict "root" . "component" "cache-node") | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "printforge.componentLabels" (dict "root" . "component" "cache-node") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      {{- include "printforge.podSecurityContext" . | nindent 6 }}
      serviceAccountName: {{ include "printforge.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cacheNode.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        - key: "printforge/role"
          operator: "Equal"
          value: "cache-node"
          effect: "NoSchedule"
      containers:
        - name: cache-node
          image: {{ include "printforge.image" (dict "root" . "image" .Values.cacheNode.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command: ["pf-cache-node"]
          ports:
            - name: http
              containerPort: {{ .Values.cacheNode.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "printforge.fullname" . }}-config
          env:
            - name: PF_CENTRAL_URL
              value: "https://{{ include "printforge.fullname" . }}-api-gateway:{{ .Values.apiGateway.service.port }}"
            {{- range $key, $value := .Values.cacheNode.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: spool-data
              mountPath: {{ .Values.cacheNode.localSpool.dataDir }}
            - name: tls-certs
              mountPath: /etc/printforge/tls
              readOnly: true
            - name: jwt-keys
              mountPath: /etc/printforge/jwt
              readOnly: true
            - name: tmp
              mountPath: /tmp
          {{- include "printforge.securityContext" . | nindent 10 }}
          resources:
            {{- toYaml .Values.cacheNode.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: spool-data
          hostPath:
            path: {{ .Values.cacheNode.localSpool.dataDir }}
            type: DirectoryOrCreate
        - name: tls-certs
          secret:
            secretName: {{ default (printf "%s-tls" (include "printforge.fullname" .)) .Values.tls.existingSecret }}
            optional: false
        - name: jwt-keys
          secret:
            secretName: {{ include "printforge.fullname" . }}-jwt
            optional: false
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
{{- end }}
