#
# IMPORTANT: This creates placeholder secrets for initial deployment.
# In production, replace these with externally managed secrets (e.g., Vault,
# Sealed Secrets, or SOPS). Never store real credentials in version control.
#
# NIST 800-53 Rev 5: SC-12 — Cryptographic Key Establishment and Management
# NIST 800-53 Rev 5: SC-28 — Protection of Information at Rest
---
{{- if not .Values.postgresql.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "printforge.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "printforge.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
data:
  # -- PLACEHOLDER: Replace with a real password before production deployment.
  # Generate with: echo -n "YOUR_PASSWORD" | base64
  postgresql-password: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24="
{{- end }}
---
{{- if not .Values.rustfs.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "printforge.fullname" . }}-rustfs
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "printforge.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
data:
  # -- PLACEHOLDER: Replace with real credentials before production deployment.
  root-user: "cnVzdGZzYWRtaW4="
  root-password: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24="
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "printforge.fullname" . }}-jwt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "printforge.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
data:
  # -- PLACEHOLDER: Replace with a real Ed25519 public key (PEM, base64-encoded).
  # NIST 800-53 Rev 5: IA-5 — Authenticator Management
  jwt-public-key: ""
