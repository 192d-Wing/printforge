#
# cargo-deny configuration — enforces license policy and vulnerability checks
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

# ─── Advisories ───────────────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"
ignore = []

# ─── Licenses ─────────────────────────────────────────────────────────────────
[licenses]
unlicensed = "deny"
default = "deny"
copyleft = "deny"

allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",            # Boost — permissive
    "OpenSSL",
    "CC0-1.0",
]

deny = [
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "GPL-2.0-only",
    "GPL-2.0-or-later",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "SSPL-1.0",
    "ELv2",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ─── Bans ─────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"            # No wildcard version deps
highlight = "all"
allow = []
deny = [
    # Deny known-problematic crates
    { name = "openssl-sys", wrappers = ["openssl"] },  # Prefer ring for new code
]

# ─── Sources ──────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
